site_name: DataSpringFlow Python API Documentation
theme:
  name: material
  palette:
    scheme: slate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

hooks:
  - doc_hook.py

nav:
  - Home: index.md
  - API Reference: api.md
  - Rust API Docs: rustdoc/index.html
