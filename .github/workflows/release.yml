name: Build & Pack Highly Compatible Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 步骤 1：利用 musl-tools 编译完全静态链接的 CLI (dsf)
      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust musl Target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Build Static Rust CLI (dsf)
        working-directory: ./rust
        run: |
          cargo build --release --target x86_64-unknown-linux-musl --bin dsf

      # 步骤 2：利用容器编译基于 musl 的高兼容 Python Wheel
      - name: Build musllinux Python Wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-musl
          args: --release --strip --manylinux musllinux_1_1
          # working-directory: ./rust # 告诉 maturin 你的 Cargo.toml 在哪里

          # 步骤 3：合体装箱
      - name: Pack Self-Extracting Installer
        run: |
          mkdir -p dist_payload          

          # 搬运完全静态链接的 musl 二进制 CLI
          cp rust/target/x86_64-unknown-linux-musl/release/dsf dist_payload/

          cp rust/target/wheels/*.whl dist_payload/

          cp README.md LICENSE dist_payload/ || true

          # 打包内嵌数据体并合体
          tar -czf payload.tar.gz -C dist_payload .
          cat scripts/install_payload.sh payload.tar.gz > dsf_installer.sh
          chmod +x dsf_installer.sh

      - name: Create GitHub Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dsf_installer.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
