
[tool.ruff]
src = ["src", "tests"]
exclude = ["*/.venv/*", "build/*", "dist/*"]
select = ["E", "F", "W", "C", "B"]
ignore = ["E203"]
target-version = "py37"

[tool.ruff.per-file-ignores]
"tests/*" = ["D", "S"]


[tool.pyright]
include = ["src"]
pythonVersion = "3.7"
typeCheckingMode = "strict"

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["dataspringflow"]
src_paths = ["src"]
