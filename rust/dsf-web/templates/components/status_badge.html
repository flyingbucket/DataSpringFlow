<span class="status-badge" style="font-size: 0.85rem; font-weight: 600; padding: 0.25rem 0.65rem; border-radius: 20px; display: inline-flex; align-items: center; gap: 0.35rem; text-transform: uppercase;">
    {% if let Some(status) = detail.busy_status %}
        <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: var(--pico-primary-background); animation: pulse 1.5s infinite;"></span>
        <span style="color: var(--pico-primary);">Busy ({{ status }})</span>
    {% else %}
        <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: #52c41a;"></span>
        <span style="color: #52c41a;">Healthy / Idle</span>
    {% endif %}
</span>

<style>
@keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 149, 193, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 149, 193, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 149, 193, 0); }
}
</style>
