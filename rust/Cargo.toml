[package]
name = "dataspringflow-rs"
version = "0.1.0"
edition = "2024"

[lib]
name = "dataspringflow_rs"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.29.0", features = ["extension-module", "abi3-py39"] }
walkdir = "2"
rayon = "1.12"
blake3 = { version = "1.8", features = ["traits-preview", "rayon", "mmap"] }
bincode = "1"
thiserror = "2"
serde_json = "1"
rusqlite = { version = "0.39", features = ["bundled"] }
r2d2 = "0.8"
r2d2_sqlite = "0.34.0"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
dirs = "6"

[dev-dependencies]
tempfile = "3"
