[package]
name = "dataspringflow-rs"
version = "0.1.0"
edition = "2024"

[lib]
name = "dataspringflow_rs"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.29.0", features = ["extension-module", "abi3-py39"] }
walkdir = "2"
# blake3 = { version = "1.8", features = ["rayon"] }
blake3 = { version = "1.8", features = ["traits-preview", "rayon", "mmap"] }
